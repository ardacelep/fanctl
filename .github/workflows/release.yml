name: Release

# Build native bundles with `flet build` on each OS and attach them to a GitHub
# Release. Trigger by pushing a version tag, e.g.:  git tag v0.1.0 && git push --tags
#
# NOTE: flet build requires the Flutter SDK (installed here on the runners) and
# can't be tested without it locally — expect to tweak this on its first run.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   target: macos,   name: fanctl-macos }
          - { os: windows-latest, target: windows, name: fanctl-windows }
          - { os: ubuntu-latest,  target: linux,   name: fanctl-linux }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install flet
        run: pip install flet

      # --yes lets flet install the exact Flutter SDK it needs, non-interactively
      # (the runners already provide Xcode / Visual Studio / GTK toolchains).
      # PYTHONUTF8 avoids a UnicodeEncodeError from flet's output on Windows' cp1252 console.
      - name: Build
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: flet build ${{ matrix.target }} --no-rich-output --yes

      # Package only the final artifact — zipping all of build/<target> pulls in
      # multi-GB Flutter intermediates and blows past GitHub's 2 GB asset limit.
      - name: Archive bundle
        shell: bash
        run: |
          set -e
          out="$GITHUB_WORKSPACE/${{ matrix.name }}.zip"
          case "${{ matrix.target }}" in
            macos)
              app=$(find build/macos -maxdepth 3 -name '*.app' | head -1)
              echo "Packaging $app"
              ditto -c -k --keepParent "$app" "$out" ;;
            windows)
              7z a "$out" ./build/windows/* ;;
            linux)
              ( cd build/linux && zip -r "$out" . ) ;;
          esac
          ls -lh "$out"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}.zip
          generate_release_notes: true
